name: Discord Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # يعيد تشغيل البوت كل 4 ساعات عشان ما يطفي أبدًا
  workflow_dispatch: # يخليك تشغله يدويًا لو تبي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # هذا عشان التوكن يكون مخفي وأمان
        run: python main.py
